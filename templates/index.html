<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard & AI Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f0f2f5; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; /* Evita scroll doble en la página completa */
        }

        header { 
            background: #004578; 
            color: white; 
            padding: 15px; 
            text-align: center; 
            flex-shrink: 0;
        }

        /* Contenedor Principal Adaptable */
        .main-container { 
            display: flex; 
            flex: 1; 
            flex-direction: row; /* Horizontal en PC */
            overflow: hidden; 
        }

        /* Lado Izquierdo: Power BI */
        .report-section { 
            flex: 2; 
            padding: 10px; 
            display: flex; 
            background: #e5e5e5; 
            height: 100%;
        }
        
        iframe { 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            width: 100%; 
            height: 100%; 
        }

        /* Lado Derecho: Chat */
        .chat-section { 
            flex: 1; 
            background: white; 
            border-left: 1px solid #ddd; 
            display: flex; 
            flex-direction: column; 
            max-width: 450px; 
            min-width: 300px;
        }

        #chat-window { 
            flex: 1; 
            padding: 15px; 
            overflow-y: auto; 
            background: #fff; 
        }

        .message { margin-bottom: 15px; padding: 12px; border-radius: 8px; line-height: 1.4; font-size: 14px; }
        .user-msg { background: #dcf8c6; align-self: flex-end; margin-left: 15%; border: 1px solid #c5e1a5; }
        .ai-msg { background: #f1f0f0; align-self: flex-start; margin-right: 15%; border: 1px solid #e0e0e0; }

        .input-area { 
            padding: 15px; 
            border-top: 1px solid #ddd; 
            display: flex; 
            gap: 8px; 
            background: #f9f9f9;
        }

        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        button { padding: 10px 18px; background: #004578; color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; }

        /* --- MEDIA QUERIES PARA MÓVIL --- */
        @media (max-width: 768px) {
            .main-container { 
                flex-direction: column; /* Vertical en Celular */
                overflow-y: auto; /* Permite scroll si el contenido es largo */
            }

            .report-section { 
                flex: none; 
                height: 45vh; /* El reporte ocupa casi la mitad de la pantalla */
                width: 100%;
            }

            .chat-section { 
                flex: 1; 
                max-width: 100%; 
                min-width: 100%; 
                border-left: none;
                border-top: 2px solid #ddd;
                height: 55vh; /* El chat ocupa el resto */
            }

            header h2 { font-size: 18px; }
        }
    </style>
</head>
<body>

<header>
    <h2>Sistema de Inteligencia de Datos - Google Ads</h2>
</header>

<div class="main-container">
    <div class="report-section">
        <iframe title="bi google" 
                src="https://app.powerbi.com/reportEmbed?reportId=92c3bcdc-4dc6-4e05-8783-efdd8e0dc66a&autoAuth=true&ctid=2cac6292-3635-4863-ab5f-1270fd538645" 
                frameborder="0" allowFullScreen="true">
        </iframe>
    </div>

    <div class="chat-section">
        <div id="chat-window">
            <div class="message ai-msg">Hola, soy la inteligencia artificial de Dimitry. ¿Qué información deseas consultar hoy?</div>
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Pregunta sobre la data..." onkeypress="if(event.key==='Enter') enviarPregunta()">
            <button onclick="enviarPregunta()">Consultar</button>
        </div>
    </div>
</div>

<script>
    async function enviarPregunta() {
        const input = document.getElementById('user-input');
        const chatWindow = document.getElementById('chat-window');
        const texto = input.value;
        if (!texto) return;

        chatWindow.innerHTML += `<div class="message user-msg">${texto}</div>`;
        input.value = '';
        chatWindow.scrollTop = chatWindow.scrollHeight;

        try {
            const response = await fetch('/preguntar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pregunta: texto })
            });
            const data = await response.json();
            
            chatWindow.innerHTML += `<div class="message ai-msg"><b>Respuesta:</b><br>${data.respuesta.replace(/\n/g, '<br>')}</div>`;
            chatWindow.scrollTop = chatWindow.scrollHeight;
        } catch (err) {
            chatWindow.innerHTML += `<div class="message ai-msg" style="color:red">Error al conectar con el servidor.</div>`;
        }
    }
</script>

</body>
</html>
